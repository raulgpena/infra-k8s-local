name: Publish Helm chart

# Publishes k8s/helm/base-app to GitHub Packages (ghcr.io) as an OCI artifact.
# Trigger by pushing a tag like `base-app-v0.1.0`, or run manually.
on:
  push:
    tags:
      - "base-app-v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write # required to push to ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Lint chart
        run: helm lint k8s/helm/base-app

      - name: Package chart
        run: helm package k8s/helm/base-app -d k8s/helm/dist

      - name: Log in to ghcr.io
        run: echo "${{ secrets.MY_GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart
        run: |
          # ghcr requires a lowercase owner path
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          chart="$(ls k8s/helm/dist/*.tgz)"
          echo "Pushing ${chart} to oci://ghcr.io/${owner}/charts"
          helm push "${chart}" "oci://ghcr.io/${owner}/charts"

      - name: Upload packaged chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: k8s/helm/dist/*.tgz
